services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ES_VERSION:-9.3.1}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.license.self_generated.type: basic
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "${ES_PORT:-9200}:9200"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9200'"]
      interval: 5s
      timeout: 5s
      retries: 24

  es-bulk-loader:
    build:
      context: ../
      dockerfile: build/package/Dockerfile
      args:
        APPLICATION: es-bulk-loader
        VERSION: e2e
        PACKAGE: jnovack/elasticsearch-bulk-loader
    depends_on:
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./fixtures:/fixtures:ro
    entrypoint: ["/app"]
