name: Build Docker Image
# v1.0.3

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  push_to_registry:
    if: startsWith(github.ref, 'refs/tags/')
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    env:
      RELEASE_DATE: ""
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Set release date
        run: |
          echo "RELEASE_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> ${GITHUB_ENV}

      - name: Check out the repo
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_API_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_ORGANIZATION }}/${{ vars.DOCKER_REPOSITORY }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{version}}

      # Needed for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/package/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            "APPLICATION=${{ vars.DOCKER_APPLICATION || github.event.repository.name }}"
            "BUILD_RFC3339=${{ env.RELEASE_DATE }}"
            DESCRIPTION="${{ github.event.repository.description }}"
            "PACKAGE=${{ github.repository }}"
            "REVISION=${{ github.sha }}"
            "VERSION=${{ github.ref_name }}"
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
