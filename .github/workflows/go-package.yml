name: Go Cross-Compile and Release

on:
  push:
    tags:
      - "v*" # e.g. v1.0.0
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: Set release date
        run: |
          echo "BUILD_RFC3339=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_ENV

      - name: Determine version
        id: vars
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            VERSION="dev-${SHORT_SHA}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          echo "Building for ${{ matrix.goos }}/${{ matrix.goarch }}"
          mkdir -p dist
          VERSION=${{ steps.vars.outputs.version }}
          BUILD_RFC3339=${BUILD_RFC3339}
          REVISION=${GITHUB_SHA}
          BIN_NAME="${{ vars.GOLANG_APPLICATION }}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BIN_NAME="${BIN_NAME}.exe"
          fi
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w -X main.version=${VERSION} -X main.buildRFC3339=${BUILD_RFC3339} -X main.revision=${REVISION}" \
            -o "dist/${BIN_NAME}" ./cmd/${{ vars.GOLANG_APPLICATION }}

      - name: Package archive
        run: |
          cd dist
          VERSION=${{ steps.vars.outputs.version }}
          BASE="${{ vars.GOLANG_APPLICATION }}-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${BASE}.zip" "${BASE}.exe"
            rm "${BASE}.exe"
          else
            tar -czf "${BASE}.tar.gz" "${BASE}"
            rm "${BASE}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.GOLANG_APPLICATION }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Generate release notes
        id: notes
        run: |
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "## Changes since last release" >> $GITHUB_OUTPUT
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' ${PREV_TAG}..HEAD^ >> $GITHUB_OUTPUT
          else
            git log --pretty=format:'- %s' >> $GITHUB_OUTPUT
          fi
          echo >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
